<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Abraham Calas Torres</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0f; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .code { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .msg { font-size: 1.25rem; color: #71717a; margin: 1rem 0 2rem; }
    a { display: inline-block; padding: 0.75rem 2rem; border: 1px solid rgba(99,102,241,0.4); border-radius: 50px; color: #e4e4e7; text-decoration: none; transition: all 0.3s; }
    a:hover { background: rgba(99,102,241,0.15); border-color: #6366f1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="msg">Esta pagina no existe. Volvamos al inicio.</p>
    <a href="/">Ir al inicio</a>
  </div>
</body>
</html>
